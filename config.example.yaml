# AI Index 配置

product:
  name: AI Index
  version: "1.0"

# 插件化：页面 / Agent / 策略 / 提醒 / 数据源均可扩展
plugins:
  # 只启用列出的页面 id；省略则启用全部内置页面
  # enabled: [dashboard, opportunity, score, portfolio, alerts, holdings, parameters]
  disabled: []
  # 额外插件模块（需提供 register(registry) ）
  modules: []
  # 是否扫描 setuptools entry_points 组 jijin.plugins
  entry_points: true

cache:
  dir: data
  fund_list_ttl_hours: 24
  valuation_ttl_hours: 6
  index_daily_ttl_hours: 12
  macro_ttl_hours: 24
  # 单个指数分析硬超时（秒）；超时跳过，避免进度卡在最后一项
  score_index_timeout_sec: 20

performance:
  # 公开数据接口并发数（I/O 密集）；建议 6~10，上限 12
  max_workers: 8

trend:
  default_horizon: 1m
  indicators:
    ma_short: 20
    ma_medium: 60
    ma_long: 120
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    rsi_length: 14
    roc_length: 20
    adx_length: 14
    volatility_window: 60
    volume_window: 20
  weights:
    ma: 0.30
    macd: 0.25
    rsi: 0.15
    momentum: 0.15
    volume: 0.15
  thresholds:
    rsi_oversold: 30
    rsi_overbought: 70
    volume_expand_ratio: 1.20
    volume_contract_ratio: 0.80
    risk_volatility_medium: 22
    risk_volatility_high: 25
    adx_trend_min: 25
    adx_range_max: 20
    regime_range_shrink: 0.40
    supertrend_length: 10
    supertrend_multiplier: 3.0
    supertrend_boost: 4.0
    mtf_align_delta: 0.03
  enhancements:
    soft_ma_score: true
    regime_filter: true
    supertrend_confirm: true
    multi_horizon_align: true

scoring:
  weights:
    valuation: 0.25
    trend: 0.15
    capital: 0.12
    earnings: 0.12
    risk: 0.08
    sentiment: 0.08
    macro: 0.12
    policy: 0.08
  labels:
    opportunity_min: 70
    neutral_min: 45

macro:
  enabled: true
  weights:
    pmi: 0.40
    cpi: 0.30
    liquidity: 0.30
  thresholds:
    pmi_expansion: 50.0
    pmi_strong: 52.0
    cpi_low: 0.5
    cpi_comfort_high: 3.0
    cpi_high: 4.5
    m2_soft: 7.0
    m2_comfort: 9.0
    m2_hot: 12.0
  policy:
    stance: auto
    manual_score: null

screen:
  index_keywords:
    - 沪深300
    - 中证500
    - 中证1000
    - 创业板
  min_scale_yi: 2.0
  max_total_fee: 1.0
  max_purchase_fee: 0.2
  share_class: A
  subtype_mode: passive
  subtype_keywords: []
  exclude_keywords:
    - QDII
  sort_by: score_desc
  top_n: 30
  enrich_fees: false
  attach_index_metrics: false
  rule_4433: false

valuation:
  metric: pe
  mid_reference_pct: 50
  bands:
    - { max_percentile: 20, label: 低估, target_pct: 90 }
    - { max_percentile: 40, label: 偏低, target_pct: 70 }
    - { max_percentile: 60, label: 适中, target_pct: 50 }
    - { max_percentile: 80, label: 偏高, target_pct: 30 }
    - { max_percentile: 100, label: 高估, target_pct: 15 }
  watch_indexes:
    - 沪深300
    - 中证500
    - 中证1000
    - 创业板50
    - 科创50
    - 中证消费
    - 中证医药
    - 证券公司

opportunity:
  top_n: 15
  # 全市场扫描总超时（秒）；超时返回已完成的部分结果
  scan_timeout_sec: 90
  # 可选：全部 / 宽基规模 / 红利风格 / 一级行业 / 金融地产 / 消费医药 / 科技成长 / 周期制造
  universe_group: 全部

portfolio:
  total_assets: 100000
  holdings:
    - code: "110020"
      name: 易方达沪深300ETF联接A
      amount: 30000
      index: 沪深300
    - code: "161017"
      name: 富国中证500指数增强
      amount: 20000
      index: 中证500

alert:
  min_rebalance_pct: 5.0
  notify: console
  dca_day: 1
  monthly_dca: 3000
  always_show_dca: true

# 策略自动校准（Walk-Forward）；界面「策略参数 → 自动校准」可改
calibration:
  years: 5.0
  forward_days: 21
  train_days: 504
  test_days: 63
  step_days: 63
  shrinkage: 0.35
